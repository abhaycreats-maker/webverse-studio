<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h2>Admin Dashboard 🚀</h2>

<input id="service" placeholder="New Service">
<button onclick="addService()">Add</button>

<ul id="list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgYqgf6CxCPDj5eOtrjlK7Jvolg6gr2x8",
  authDomain: "p1andey.firebaseapp.com",
  projectId: "p1andey",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){
  const res = await getDocs(collection(db,"services"));
  const list = document.getElementById("list");
  list.innerHTML="";

  res.forEach(d=>{
    let li = document.createElement("li");
    li.innerHTML = `${d.data().name} <button onclick="del('${d.id}')">Delete</button>`;
    list.appendChild(li);
  });
}

window.addService = async function(){
  await addDoc(collection(db,"services"),{
    name:service.value
  });
  load();
}

window.del = async function(id){
  await deleteDoc(doc(db,"services",id));
  load();
}

load();
</script>

</body>
</html>
